<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../style/output.css" />
    <link rel="shortcut icon" href="../images/logo.png" type="image/x-icon" />
    <title>Dr.Pet | Administrador</title>
</head>

<body>
    <div class="bg-gray-50 min-h-screen">
        <main class="container px-4 md:px-20 py-10 md:py-[120px] flex flex-col items-center">
            <nav class="flex items-center justify-center flex-wrap gap-4 sm:gap-6 lg:gap-10 w-full max-w-[1288px]">
                <button type="button" data-tab-btn data-target="section-slides"
                    class="flex justify-center items-center px-4 py-3 md:py-4 w-[140px] xs:w-[160px] sm:w-[180px] lg:w-[270px] bg-green-600 rounded-[10px] shadow-[3px_3px_8px_0px_rgba(0,0,0,0.1)] hover:bg-green-700 focus:outline-none focus:ring-4 focus:ring-white focus:ring-offset-2 focus:ring-offset-green-500 transition-all shrink-0">
                    <span
                        class="font-sans font-semibold text-lg xs:text-xl lg:text-3xl leading-snug lg:leading-10 text-gray-50">Slides</span>
                </button>

                <button type="button" data-tab-btn  data-target="section-agenda"
                    class="flex justify-center items-center px-4 py-3 md:py-4 w-[140px] xs:w-[160px] sm:w-[180px] lg:w-[270px] bg-gray-200 rounded-[10px] hover:bg-gray-300 focus:outline-none focus:ring-4 focus:ring-green-600/50 transition-all shrink-0">
                    <span
                        class="font-sans font-semibold text-lg xs:text-xl lg:text-3xl leading-snug lg:leading-10 text-green-700">Agenda</span>
                </button>

                <button type="button" data-tab-btn  data-target="section-produtos"
                    class="flex justify-center items-center px-4 py-3 md:py-4 w-[140px] xs:w-[160px] sm:w-[180px] lg:w-[270px] bg-gray-200 rounded-[10px] hover:bg-gray-300 focus:outline-none focus:ring-4 focus:ring-green-600/50 transition-all shrink-0">
                    <span
                        class="font-sans font-semibold text-lg xs:text-xl lg:text-3xl leading-snug lg:leading-10 text-green-700">Produtos</span>
                </button>
            </nav>

            <section id="section-slides" data-tab-content class="animate-fadeLeft opacity-1 w-full max-w-[1400px] mt-10 md:mt-20">
                <h2 class="font-sans font-bold text-xl md:text-3xl leading-tight md:leading-[40px] text-green-700 whitespace-nowrap">
                    Defina os Slides da Home
                </h2>

                <picture data-content-slides
                    class="mt-6 md:mt-10 flex items-center gap-10 py-5 w-full overflow-x-auto flex-nowrap md:flex-wrap md:overflow-visible">
                    <label type="file" data-add-slide for="button-add-slide-file"
                        class="cursor-pointer max-w-[280px] min-w-[200px] h-[148px] w-full flex flex-col items-center justify-center gap-5 px-[30px] py-5 border-2 border-dashed border-gray-400 rounded-[10px] hover:bg-gray-200 transition-colors shrink-0">
                        <img src="../images/icons/administrador/plus-slide.svg" alt="Adicionar" class="w-10 h-10">
                        <span class="font-sans font-semibold text-[20px] leading-[25px] text-green-600">
                            Adicionar Slide
                        </span>
                        <input type="file" class="hidden overflow-hidden" id="button-add-slide-file">
                    </label>
                </picture>
            </section>

            <section id="section-agenda" data-tab-content class="animate-fadeLeft opacity-0 hidden w-full max-w-[1400px] mt-10 md:mt-20">
                <div class="flex flex-col gap-10 w-full">
                    <h2 class="font-sans font-bold text-xl md:text-3xl leading-tight md:leading-[40px] text-green-700 whitespace-nowrap">
                        Agenda</h2>
                    <div class="flex flex-wrap items-end gap-10 w-full">

                        <div class="flex flex-col gap-[15px]">
                            <label
                                class="font-sans font-semibold text-xl md:text-[26px] leading-[32px] text-gray-700">
                                Escolha a data
                            </label>
                            <div class="relative w-[220px]">
                                <input type="date" data-input-date="adm"
                                    class="px-5 py-[10px] w-full border-2 border-green-600 rounded-[5px] shadow-sm font-medium text-lg md:text-[22px] leading-[27px] text-gray-600 outline-none cursor-pointer focus:ring-4 focus:ring-green-600/30 transition-all [&::-webkit-calendar-picker-indicator]:opacity-0 [&::-webkit-calendar-picker-indicator]:cursor-pointer">
                                <img src="../images/icons/administrador/calendar-plus.svg" alt="Calendário"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 w-6 h-6 pointer-events-none">
                            </div>
                        </div>

                        <div class="flex flex-col gap-[15px]">
                            <label
                                class="font-sans font-semibold text-xl md:text-[26px] leading-[32px] text-gray-700">
                                Escolha o Serviço
                            </label>
                            <div class="relative w-[280px]">
                                <select
                                    data-select="service"
                                    class="px-5 py-[10px] w-full border-2 border-green-600 rounded-[5px] shadow-sm font-medium text-lg md:text-[22px] leading-[27px] text-gray-600 outline-none bg-white cursor-pointer appearance-none focus:ring-4 focus:ring-green-600/30 transition-all">
                                    <option value="all" selected>Todas as Opções</option>
                                    <option value="Cirurgia">Cirurgia</option>
                                    <option value="Banho e tosa">Banho e tosa</option>
                                    <option value="Exames">Exames</option>
                                </select>
                                <img src="../images/icons/arrow-down.svg" alt="Seta"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 w-8 h-8 pointer-events-none">
                            </div>
                        </div>

                        <button type="button" data-button="searchSchedule"
                            class="flex flex-row items-center justify-center gap-[15px] px-7 py-[10px] bg-green-600 rounded-[5px] shadow-sm hover:bg-green-700 focus:outline-none focus:ring-4 focus:ring-white focus:ring-offset-2 focus:ring-offset-green-500 transition-all">
                            <span
                                class="font-sans font-semibold text-lg md:text-[22px] leading-[27px] text-white">
                                Filtrar Horários
                            </span>
                            <img class="w-5 h-5" src="../images/icons/search-gray.svg" alt="Visualizar">
                        </button>
                    </div>
                </div>

                <div data-content-schedule class="mt-10 grid grid-cols-1 md:grid-cols-[repeat(auto-fit,minmax(340px,1fr))] gap-[30px] md:gap-[50px] w-full overflow-y-auto max-h-[1000px] scroll pb-2 pr-2"></div>
            </section>

            <section id="section-produtos" data-tab-content class="animate-fadeLeft opacity-0 hidden w-full max-w-[1400px] mt-10 md:mt-20">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center w-full gap-5">
                    <h2 class="font-sans font-bold text-xl md:text-3xl leading-tight md:leading-[40px] text-green-700 whitespace-nowrap">
                        Gestão de Produtos
                    </h2>
                    <button type="button"
                        class="flex flex-row items-center gap-[10px] md:gap-[30px] px-5 py-3 md:px-[36px] md:py-[16px] bg-green-400 rounded-[15px] hover:bg-green-500 focus:outline-none focus:ring-4 focus:ring-green-400/50 transition-all shrink-0 shadow-sm">
                        <img src="../images/icons/administrador/plus-product.svg" alt="Novo produto"
                            class="w-6 h-6 md:w-[30px] md:h-[30px]">
                        <span data-button="addProduct" class="font-sans font-semibold text-lg md:text-2xl uppercase text-gray-50">
                            Novo produto
                        </span>
                    </button>
                </div>

                <div class="mt-10 md:mt-[60px] flex flex-col p-7 md:p-[60px] bg-white rounded-[10px] shadow-[0px_1px_2px_0px_rgba(0,0,0,0.25)] gap-10 md:gap-[60px] w-full overflow-hidden">
                    <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-3 xl:gap-10 w-full">
                        <div class="relative flex flex-row justify-between items-center px-4 py-2 md:px-[36px] md:py-[12px] bg-white border-4 border-gray-300 focus-within:border-green-400 focus-within:ring-4 focus-within:ring-green-400/20 transition-all rounded-[10px] w-full flex-1">
                            <input data-input="filterProduct" type="text" placeholder="Busca por nome..." class="bg-transparent w-full outline-none font-medium text-base md:text-2xl text-gray-500 placeholder:text-gray-500">
                            <img src="../images/icons/search.svg" alt="Buscar" class="w-6 h-6 md:w-[32px] md:h-[33px]">
                        </div>

                        <div class="relative shrink-0 min-w-fit md:min-w-[400px] w-full md:w-auto">
                            <select data-select="typeProduct" class="w-full pl-8 pr-8 xs:pr-20 py-3 md:py-[18px] bg-gray-100 focus:bg-white focus:outline-none focus:ring-4 focus:ring-green-400/50 transition-all rounded-[10px] font-semibold text-sm xs:text-base md:text-2xl uppercase text-gray-700 cursor-pointer appearance-none">
                                <option value="all" selected>Todas as Categorias</option>
                                <option value="ração">Ração</option>
                                <option value="brinquedos">Brinquedos</option>
                                <option value="medicamentos">Medicamentos</option>
                                <option value="acessórios">Acessórios</option>
                                <option value="higiene">Higiene</option>
                            </select>
                            <img src="../images/icons/arrow-down.svg" alt="Seta para baixo" class="hidden xs:block absolute right-5 top-1/2 -translate-y-1/2 w-10 pointer-events-none">
                        </div>
                    </div>

                    <div class="scroll w-full overflow-x-auto pb-1">
                        <table class="table-caption w-full min-w-[1200px] xl:min-w-[1400px] text-left border-collapse [&_th]:px-4 lg:[&_th]:px-6 [&_td]:px-4 lg:[&_td]:px-6">
                            <thead>
                                <tr class="border-b-[3px] border-gray-100 *:pb-5 *:font-semibold *:text-sm *:md:text-lg *:lg:text-xl *:leading-[32px] *:text-gray-700 *:whitespace-nowrap">
                                    <th>Produto</th>
                                    <th>Categoria</th>
                                    <th>Preço (R$)</th>
                                    <th>Descrição Longa</th>
                                    <th>Descrição Curta</th>
                                    <th class="text-center">Editar</th>
                                    <th class="text-center">Excluir</th>
                                </tr>
                            </thead>
                            <tbody data-content-products="table"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- form add product -->
    <div data-modal="addProduct" class="hidden fixed inset-0 z-20 items-center justify-center bg-black/50 animate-fadeItem">
        <div class="relative w-[95%] max-w-[720px] rounded-[15px] overflow-hidden shadow-[0px_4px_20px_0px_rgba(0,0,0,0.15)]">
            <form data-form="addProduct" class="relative max-h-[90vh] overflow-y-auto scroll bg-white p-6 md:p-10 flex flex-col gap-6 md:gap-8">
                
                <button type="button" data-button="closeFormProduct" class="absolute top-4 right-4 md:top-6 md:right-6 w-9 h-9 flex items-center justify-center rounded-full bg-gray-100 hover:bg-red-100 text-gray-500 hover:text-red-500 transition-colors text-xl font-bold leading-none">
                    <img src="../images/icons/administrador/delete-slide.svg" alt="Fechar Formulário">
                </button>

                <h3 class="font-sans font-bold text-xl md:text-2xl text-green-600 pr-10">Adicionar Novo Produto</h3>

                <div class="flex flex-col gap-[10px]">
                    <label for="input-product-name" class="font-sans font-semibold text-base md:text-lg text-gray-700">Nome do Produto</label>
                    <input data-input="product-name" id="input-product-name" type="text" name="name" placeholder="Ex: Ração Golden Cães Adultos" required
                        class="px-4 py-3 w-full border-2 border-gray-300 rounded-[8px] font-medium text-base md:text-lg text-gray-600 outline-none focus:border-green-500 focus:ring-4 focus:ring-green-500/20 transition-all placeholder:text-gray-400">
                </div>

                <div class="flex flex-col sm:flex-row gap-6">
                    <div class="flex flex-col gap-[10px] flex-1">
                        <label for="select-product-category" class="font-sans font-semibold text-base md:text-lg text-gray-700">Categoria</label>
                        <div class="relative">
                            <select data-select-new="productCategory" id="select-product-category" name="category" required
                                class="px-4 py-3 w-full border-2 border-gray-300 rounded-[8px] font-medium text-base md:text-lg text-gray-600 outline-none bg-white cursor-pointer appearance-none focus:border-green-500 focus:ring-4 focus:ring-green-500/20 transition-all">
                                <option value="" disabled selected>Selecione uma categoria</option>
                                <option value="Ração">Ração</option>
                                <option value="Brinquedos">Brinquedos</option>
                                <option value="Medicamentos">Medicamentos</option>
                                <option value="Acessórios">Acessórios</option>
                                <option value="Higiene">Higiene</option>
                            </select>
                            <img src="../images/icons/arrow-down.svg" alt="Seta para baixo" class="absolute right-3 top-1/2 -translate-y-1/2 w-6 h-6 pointer-events-none">
                        </div>
                    </div>

                    <div class="flex flex-col gap-[10px] sm:w-[200px]">
                        <label for="input-product-price" class="font-sans font-semibold text-base md:text-lg text-gray-700">Preço (R$)</label>
                        <input data-input="priceProduct" id="input-product-price" type="text" name="price" min="0" step="0.01" placeholder="R$ 0,00" required
                            class="appearance-none px-4 py-3 w-full border-2 border-gray-300 rounded-[8px] font-medium text-base md:text-lg text-gray-600 outline-none focus:border-green-500 focus:ring-4 focus:ring-green-500/20 transition-all placeholder:text-gray-400">
                    </div>
                </div>

                <div class="flex flex-col gap-[10px]">
                    <label for="textarea-short-description" class="font-sans font-semibold text-base md:text-lg text-gray-700">Descrição Curta</label>
                    <textarea data-textarea="shortDescription" id="textarea-short-description" name="shortDescription" rows="2" placeholder="Breve descrição do produto..." required
                        class="px-4 py-3 w-full border-2 border-gray-300 rounded-[8px] font-medium text-base md:text-lg text-gray-600 outline-none resize-y min-h-[70px] focus:border-green-500 focus:ring-4 focus:ring-green-500/20 transition-all placeholder:text-gray-400"></textarea>
                </div>

                <div class="flex flex-col gap-[10px]">
                    <label for="textarea-long-description" class="font-sans font-semibold text-base md:text-lg text-gray-700">Descrição Longa</label>
                    <textarea data-textarea="longDescription" id="textarea-long-description" name="longDescription" rows="4" placeholder="Descrição detalhada do produto..." required
                        class="px-4 py-3 w-full border-2 border-gray-300 rounded-[8px] font-medium text-base md:text-lg text-gray-600 outline-none resize-y min-h-[120px] focus:border-green-500 focus:ring-4 focus:ring-green-500/20 transition-all placeholder:text-gray-400"></textarea>
                </div>

                <div class="flex flex-col gap-[10px]">
                    <label for="input-main-image" class="font-sans font-semibold text-base md:text-lg text-gray-700">Imagem Principal</label>
                    <label for="input-main-image"
                        class="cursor-pointer flex flex-col items-center justify-center gap-3 px-4 py-6 border-2 border-dashed border-gray-400 rounded-[10px] hover:border-green-500 hover:bg-green-50/50 transition-colors">
                        <img src="../images/icons/administrador/plus-slide.svg" alt="Adicionar imagem" class="w-8 h-8 opacity-60">
                        <span class="font-sans font-medium text-sm md:text-base text-gray-500">Clique para selecionar a imagem principal</span>
                    </label>
                    <input data-input="imageMainProduct" id="input-main-image" type="file" name="mainImage" accept="image/*" required class="hidden">
                    <span data-info="mainImage" class="font-sans text-sm text-green-600 truncate hidden"></span>
                </div>

                <div class="flex flex-col gap-[10px]">
                    <label for="input-slide-images" class="font-sans font-semibold text-base md:text-lg text-gray-700">Imagens do Slide</label>
                    <label for="input-slide-images"
                        class="cursor-pointer flex flex-col items-center justify-center gap-3 px-4 py-6 border-2 border-dashed border-gray-400 rounded-[10px] hover:border-green-500 hover:bg-green-50/50 transition-colors">
                        <img src="../images/icons/administrador/plus-slide.svg" alt="Adicionar imagens" class="w-8 h-8 opacity-60">
                        <span class="font-sans font-medium text-sm md:text-base text-gray-500">Clique para selecionar as imagens do slide</span>
                    </label>
                    <input data-input="imageSlideProduct" id="input-slide-images" type="file" name="slideImages" accept="image/*" multiple required class="hidden">
                    <div class="font-sans text-xs md:text-sm text-amber-600 flex items-center gap-3">
                        <span class="text-base">⚠</span> 
                        <p>Selecione todas as imagens do slide de uma vez (mantenha <b>Ctrl</b> ou <b>Shift</b> pressionado ao selecionar).</p>
                    </div>
                    <span data-info="slideImages" class="font-sans text-sm text-green-600 truncate hidden"></span>
                </div>

                <button data-button="createProduct" type="button"
                    class="mt-2 w-full flex items-center justify-center gap-3 px-6 py-4 bg-green-600 rounded-[10px] shadow-sm hover:bg-green-700 focus:outline-none focus:ring-4 focus:ring-white focus:ring-offset-2 focus:ring-offset-green-500 transition-all">
                    <span class="font-sans font-semibold text-lg md:text-xl text-white uppercase">Cadastrar Produto</span>
                </button>
            </form>
        </div>
    </div>

    <aside data-modal-info="adm" class="hidden z-30 animate-fadeItem opacity-0 fixed bottom-8 left-1/2 -translate-x-1/2 p-4 text-center font-semibold text-lg"></aside>
    
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.umd.min.js"></script>
    <script type="module" src="../javascript/administrador/script-adm.js"></script>
</body>
</html>
